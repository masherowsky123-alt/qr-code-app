<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Natalia i Rafał Wesele 📸</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* 🌍 BASE */
    body {
      margin: 0;
      padding: 0;

      min-height: 100vh;
      min-height: 100dvh;

      background-color: #d8bfbf;
      background-image: url("bg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;

      display: flex;
      justify-content: center;
      align-items: flex-end;

      overflow: hidden;

      animation: pageFade 1s ease-out;
    }

    @keyframes pageFade {
      from {
        opacity: 0;
        transform: scale(1.02);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .btn {
      font-family: "Playfair Display", serif;
      margin-bottom: 230px;
      padding: 18px 34px;

      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;

      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.25);

      color: white;

      cursor: pointer;
      position: relative;
      z-index: 2;

      background: rgba(158, 117, 117, 0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      box-shadow:
        0 8px 30px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.35);

      animation: btnIn 1.2s ease-out, pulse 3s infinite 1.5s;
      transition: transform 0.2s ease;
    }

    .btn:active {
      transform: scale(0.96);
    }

    @keyframes btnIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% {
        box-shadow:
          0 8px 30px rgba(0,0,0,0.25),
          0 0 0 0 rgba(188,155,155,0.4);
      }
      70% {
        box-shadow:
          0 8px 30px rgba(0,0,0,0.25),
          0 0 0 18px rgba(188,155,155,0);
      }
      100% {
        box-shadow:
          0 8px 30px rgba(0,0,0,0.25),
          0 0 0 0 rgba(188,155,155,0);
      }
    }

    #cameraInput {
      display: none;
    }

    #status {
      position: absolute;
      bottom: 200px;
      color: white;
      font-size: 14px;
      z-index: 2;

      animation: fadeStatus 1s ease-out;
    }

    @keyframes fadeStatus {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>

  <button class="btn" onclick="openCamera()">
    📸 Zrób zdjęcie
  </button>

  <input type="file" accept="image/*" capture="environment" id="cameraInput">

  <p id="status"></p>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAqBruRVVx36pg4NNRmSco-ZMLLGIg37Dk",
    authDomain: "nataliarafal-580cb.firebaseapp.com",
    projectId: "nataliarafal-580cb",
    storageBucket: "nataliarafal-580cb.firebasestorage.app",
    messagingSenderId: "206557556728",
    appId: "1:206557556728:web:13e449c0cfef2cc7e1300d"
  };

  firebase.initializeApp(firebaseConfig);
  const storage = firebase.storage();

  function openCamera() {
    document.getElementById('cameraInput').click();
  }

  // 🔥 TU JEST ZMIANA (kompresja)
  document.getElementById('cameraInput').addEventListener('change', async function () {
    const file = this.files[0];
    if (!file) return;

    document.getElementById("status").innerText = "Przetwarzanie... 📷";

    const compressedBlob = await compressImage(file);

    document.getElementById("status").innerText = "Wysyłanie... 📤";

    const fileName = "wesele_" + Date.now() + ".jpg";
    const ref = storage.ref("wesele/" + fileName);

    await ref.put(compressedBlob);

    document.getElementById("status").innerText = "Dziękujemy ❤️";
  });

  // 🔥 NOWA FUNKCJA
  function compressImage(file) {
    return new Promise((resolve) => {
      const img = new Image();
      const reader = new FileReader();

      reader.readAsDataURL(file);

      reader.onload = function (e) {
        img.src = e.target.result;
      };

      img.onload = function () {
        const canvas = document.createElement('canvas');
        const maxWidth = 1280;

        let width = img.width;
        let height = img.height;

        if (width > maxWidth) {
          height *= maxWidth / width;
          width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        canvas.toBlob(
          (blob) => resolve(blob),
          'image/jpeg',
          0.7
        );
      };
    });
  }
</script>

</body>
</html>
