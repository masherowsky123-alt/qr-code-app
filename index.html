<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Wesele Natali & Rafał 📸</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;

      /* 📸 TWOJE TŁO */
      background-image: url("bg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      font-family: Arial;

      display: flex;
      justify-content: center;
      align-items: flex-end;
    }

    /* 📸 przycisk */
    .btn {
      margin-bottom: 80px;
      padding: 18px 30px;
      font-size: 18px;
      border-radius: 14px;
      border: none;
      background: #ff4d6d;
      color: white;
      z-index: 2;
      position: relative;
      cursor: pointer;
    }

    #cameraInput {
      display: none;
    }

    /* status uploadu */
    #status {
      position: absolute;
      bottom: 150px;
      color: white;
      font-size: 14px;
      z-index: 2;
    }
  </style>
</head>

<body>

  <button class="btn" onclick="openCamera()">
    📸 Zrób zdjęcie
  </button>

  <input type="file" accept="image/*" capture="environment" id="cameraInput">

  <p id="status"></p>

<script>
  // 🔴 TWÓJ FIREBASE CONFIG (NIE ZMIENIAŁEM)
  const firebaseConfig = {
    apiKey: "AIzaSyAqBruRVVx36pg4NNRmSco-ZMLLGIg37Dk",
    authDomain: "nataliarafal-580cb.firebaseapp.com",
    projectId: "nataliarafal-580cb",
    storageBucket: "nataliarafal-580cb.firebasestorage.app",
    messagingSenderId: "206557556728",
    appId: "1:206557556728:web:13e449c0cfef2cc7e1300d"
  };

  firebase.initializeApp(firebaseConfig);
  const storage = firebase.storage();

  function openCamera() {
    document.getElementById('cameraInput').click();
  }

  document.getElementById('cameraInput').addEventListener('change', async function() {
    const file = this.files[0];
    if (!file) return;

    document.getElementById("status").innerText = "Wysyłanie... 📤";

    const fileName = "wesele_" + Date.now() + ".jpg";
    const ref = storage.ref("wesele/" + fileName);

    await ref.put(file);

    document.getElementById("status").innerText = "Dziękujemy ❤️";
  });
</script>

</body>
</html>
